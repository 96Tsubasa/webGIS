<!doctype html>
<html>
  <head>
    <title>WebGIS Base Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map"></div>

    <div id="info-panel">
      <div class="panel-header">
        <div class="header-text">
          <div id="location-text">Chưa chọn</div>
          <div id="time-text">-</div>
        </div>
        <div class="header-actions">
          <button id="close-info" aria-label="Close">×</button>
        </div>
      </div>

      <div class="panel-body">
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-icon">🌡️</div>
            <div>
              <div class="stat-label">Nhiệt độ</div>
              <div id="temperature-text" class="stat-value">-</div>
            </div>
          </div>

          <div class="stat">
            <div class="stat-icon">🌧️</div>
            <div>
              <div class="stat-label">Lượng mưa</div>
              <div id="precipitation-text" class="stat-value">-</div>
            </div>
          </div>

          <div class="stat">
            <div class="stat-icon">💨</div>
            <div>
              <div class="stat-label">Gió</div>
              <div id="wind-text" class="stat-value">-</div>
            </div>
          </div>

          <div class="stat">
            <div class="stat-icon">🧭</div>
            <div>
              <div class="stat-label">Hướng</div>
              <div id="direction-text" class="stat-value">-</div>
            </div>
          </div>
        </div>

        <div class="forecast-section">
          <div class="forecast-title">Dự báo nhiệt độ</div>
          <div class="chart-card">
            <canvas id="temperature-chart" height="140"></canvas>
            <div class="chart-loading" data-chart="temperature">
              <div class="spinner"></div>
            </div>
          </div>

          <div class="forecast-title">Dự báo lượng mưa</div>
          <div class="chart-card">
            <canvas id="precipitation-chart" height="140"></canvas>
            <div class="chart-loading" data-chart="precipitation">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="legend-container"><img id="legend-image" /></div>

    <select id="weather-variable">
      <option value="temperature">Nhiệt độ</option>

      <option value="precipitation">Lượng mưa</option>
    </select>

    <div id="wind-toggle">
      <label>
        <input type="checkbox" id="wind-toggle-input" unchecked /> Gió
      </label>
    </div>

    <div id="timeline-container">
      <button id="play-btn" aria-label="Play/Pause">
        <!-- Play icon (will toggle to pause) -->
        <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 3v18l15-9L5 3z" fill="#222"/></svg>
        <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#222"/></svg>
      </button>

      <!-- invisible functional range input (kept for keyboard/accessibility) -->
      <input class="visually-hidden" type="range" id="time-slider" min="0" max="0" value="0" step="1" />

      <!-- Visual slider with ticks and progress -->
      <div id="slider-visual">
        <div class="slider-track">
          <div id="slider-ticks" class="slider-ticks"></div>
          <div id="slider-progress" class="slider-progress">
            
          </div>
          <div id="slider-handle" class="slider-handle">
              <div id="slider-time-label" class="time-label">Chưa có dữ liệu</div>
            </div>
        </div>
      </div>

      <!-- <span id="time-label" class="sr-only"> Chưa có dữ liệu </span> -->
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-velocity/dist/leaflet-velocity.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
  </body>
</html>
